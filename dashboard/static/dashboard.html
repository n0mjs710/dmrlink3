<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{REPORT_NAME}} — DMRlink3</title>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#172033; --border:#334155;
    --text:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8;
    --green:#16a34a; --green-bg:#16351f; --red:#dc2626; --red-bg:#3a1620;
    --orange:#ea580c; --orange-bg:#3a2412; --warn:#fbbf24;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);padding:14px;font-size:13px}
  .wrap{max-width:1400px;margin:0 auto}
  header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
  h1{color:var(--accent);font-size:22px;font-weight:600}
  h1 small{color:var(--muted);font-size:13px;font-weight:400;margin-left:8px}
  .badge{padding:6px 14px;border-radius:6px;font-weight:600;font-size:13px;border:1px solid var(--border)}
  .badge.up{background:var(--green-bg);color:#4ade80;border-color:var(--green)}
  .badge.down{background:var(--red-bg);color:#f87171;border-color:var(--red)}
  section{margin-bottom:22px}
  h2{font-size:15px;color:var(--accent);margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px}
  h3{font-size:13px;color:var(--muted);margin:12px 0 6px}
  table{width:100%;border-collapse:collapse;background:var(--panel);border-radius:8px;overflow:hidden;margin-bottom:12px}
  th{background:var(--panel2);color:var(--muted);text-align:left;padding:8px 10px;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border)}
  td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  .sub{color:var(--muted);font-size:11px}
  .mono{font-variant-numeric:tabular-nums}
  .sysname{font-weight:600;color:var(--accent)}
  .bridge-head td{background:var(--panel2);color:#fff;font-weight:600;font-size:12px;letter-spacing:.02em;padding-top:9px;padding-bottom:9px}
  .pill{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;border:1px solid var(--border);color:var(--muted)}
  .pill.master{border-color:var(--accent);color:var(--accent)}
  .pill.peer{border-color:#818cf8;color:#818cf8}
  .status-ok{color:#4ade80;font-weight:600}
  .status-bad{color:#f87171;font-weight:600}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .dot.ok{background:#22c55e}.dot.bad{background:#ef4444}
  .empty{color:var(--muted);padding:10px;background:var(--panel);border-radius:8px;text-align:center}
  #log{background:#0b1220;border:1px solid var(--border);border-radius:8px;height:230px;overflow-y:auto;padding:8px 10px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;line-height:1.5}
  #log .start{color:#7dd3fc}#log .end{color:#86efac}#log .ts{color:#64748b}
  /* system-level TS activity pills */
  .sys-hdr{margin:12px 0 4px}
  .peers-hdr{display:flex;justify-content:space-between;align-items:center;margin:4px 0 6px}
  .peers-hdr h3{margin:0}
  .slot-pills{display:flex;gap:8px;flex-shrink:0;margin-left:16px}
  .spill{width:280px;border-radius:6px;padding:5px 10px;font-size:12px;border:1px solid var(--border);box-sizing:border-box}
  .spill-top{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
  .spill-bot{font-size:11px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;opacity:.85}
  .spill.idle{color:var(--muted);background:var(--panel2)}
  .spill.idle .spill-top{font-weight:400}
  .spill.rx{background:var(--green-bg);color:#86efac;border-color:var(--green)}
  .spill.tx{background:var(--orange-bg);color:#fb923c;border-color:var(--orange)}
  .spill.hang{background:#0d2137;color:#7dd3fc;border-color:#075985}
  .brand{display:flex;align-items:center;gap:14px}
  .brand .logo{height:46px;width:auto;display:block}
  .self-row td{background:#1a2744;font-style:italic}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      {{LOGO_HTML}}
      <h1>{{REPORT_NAME}}<small>DMRlink3 Monitor</small></h1>
    </div>
    <div id="conn" class="badge down">DMRlink3: connecting…</div>
  </header>

  <section><h2>IPSC Systems</h2><div id="systems"></div></section>
  <section><h2>Conference Bridges</h2><div id="bridges"></div></section>
  <section><h2>Call Log</h2><div id="log"></div></section>
</div>

<script>
const ST = { systems:{}, bridges:{}, active:{}, tx_active:{}, hang:{}, log:[], dmrlink:false };
const STALE = 60000;

const el  = id => document.getElementById(id);
const esc = s  => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function dur(secs){
  secs = Math.max(0, Math.floor(secs));
  const d=Math.floor(secs/86400), h=Math.floor(secs%86400/3600), m=Math.floor(secs%3600/60), s=secs%60;
  if(d) return d+'d '+h+'h'; if(h) return h+'h '+m+'m'; if(m) return m+'m '+s+'s'; return s+'s';
}
const idName = (name, id) => name ? esc(name)+' <span class="sub mono">('+id+')</span>' : '<span class="mono">'+esc(String(id||''))+'</span>';

// one active call per system+timeslot (IPSC only allows one per TS)
const ckey = e => (e.system||'')+'|'+(e.ts||0);

// ---- system-level TS activity pills ----

// Render one TS pill for a system: RX (receiving from a peer) or TX (forwarding to system) or idle.
function sysTsPill(sys, ts){
  const rx = ST.active[sys+'|'+ts];
  const tx = ST.tx_active[sys+'|'+ts];
  function espan(e){ const s=(Date.now()/1000)-(e._arrived||0); return '<span class="js-dur" data-start="'+esc(String(e._arrived||0))+'">'+dur(s)+'</span>'; }
  function callType(e){ return (e.event||'').includes('GROUP') ? 'Voice' : 'Unit'; }
  if(rx){
    const src  = rx.src_alias  ? esc(rx.src_alias)  : esc(String(rx.src||''));
    const peer = rx.peer_alias ? esc(rx.peer_alias) : esc(String(rx.peer||''));
    const tg   = rx.tgid_alias ? esc(rx.tgid_alias) : esc(String(rx.tgid||''));
    return '<div class="spill rx">'
         + '<div class="spill-top">TS'+ts+' &nbsp;RX &nbsp;'+callType(rx)+' &nbsp;→ '+tg+'</div>'
         + '<div class="spill-bot">'+src+' via '+peer+' · '+espan(rx)+'</div>'
         + '</div>';
  }
  if(tx){
    const src      = tx.src_alias       ? esc(tx.src_alias)       : esc(String(tx.src||''));
    const src_peer = tx.src_peer_alias  ? esc(tx.src_peer_alias)  : esc(String(tx.src_peer||''));
    const tg       = tx.tgid_alias      ? esc(tx.tgid_alias)      : esc(String(tx.tgid||''));
    return '<div class="spill tx">'
         + '<div class="spill-top">TS'+ts+' &nbsp;TX &nbsp;'+callType(tx)+' &nbsp;→ '+tg+'</div>'
         + '<div class="spill-bot">'+src+' via '+src_peer+' · '+espan(tx)+'</div>'
         + '</div>';
  }
  const hg = ST.hang[sys+'|'+ts];
  if(hg){
    const tg   = hg.tgid_alias ? esc(hg.tgid_alias) : esc(String(hg.tgid||''));
    const nowS = Date.now()/1000;
    const left = Math.max(0, hg._expires - nowS);
    return '<div class="spill hang">'
         + '<div class="spill-top">TS'+ts+' &nbsp;'+(hg._ht==='tx'?'TX':'RX')+' &nbsp;hang &nbsp;→ '+tg+'</div>'
         + '<div class="spill-bot"><span class="js-countdown" data-rem="'+left.toFixed(1)+'" data-arr="'+Date.now()+'">'+dur(left)+'</span> remaining</div>'
         + '</div>';
  }
  return '<div class="spill idle">'
       + '<div class="spill-top">TS'+ts+'</div>'
       + '<div class="spill-bot">&#8212; idle &#8212;</div>'
       + '</div>';
}

// ---- renderers ----

function renderSystems(){
  const names = Object.keys(ST.systems);
  if(!names.length){ el('systems').innerHTML='<div class="empty">No systems (dmrlink3 not connected or no IPSC networks enabled)</div>'; return; }
  let h='';
  for(const n of names){
    const s    = ST.systems[n];
    const mode = s.MODE||'PEER';

    h += '<div class="sys-hdr">'
       + '<h3><span class="sysname">'+esc(n)+'</span>'
       + ' <span class="pill '+(mode==='MASTER'?'master':'peer')+'">'+esc(mode)+'</span>'
       + '</h3>'
       + '</div>';

    // Peer table — identical columns for both MASTER and PEER mode systems
    const peers = s.PEERS||{};
    const pids  = Object.keys(peers);
    const ms    = mode === 'PEER' ? (s.MASTER||{}) : null;
    const totalCount = pids.length + (ms ? 1 : 0);
    h += '<div class="peers-hdr">'
       + '<h3>Peers in IPSC ('+totalCount+')</h3>'
       + '<div class="slot-pills">'+sysTsPill(n,1)+sysTsPill(n,2)+'</div>'
       + '</div>';

    {
      h += '<table><tr><th>Radio ID</th><th>Address</th><th>Status</th></tr>';

      // Local system (self) always appears first so all columns stay aligned.
      h += '<tr class="self-row">'
         + '<td class="mono">'+esc(s.RADIO_ID)+' <span class="pill">self</span></td>'
         + '<td class="mono">'+esc(s.IP||'0.0.0.0')+':'+esc(s.PORT)+'</td>'
         + '<td><span class="dot ok"></span><span class="status-ok">Active</span></td>'
         + '</tr>';

      // Inject master as next row when we are a PEER — the master does not
      // include itself in the peer list it sends us, so we synthesise the row.
      if(ms){
        const mrid = ms.RADIO_ID != null ? ms.RADIO_ID : '—';
        const mok  = ms.CONNECTED;
        const mUp  = mok && ms.connected_secs != null
          ? '<div class="sub">up <span class="js-since" data-base="'+ms.connected_secs+'" data-arr="'+Date.now()+'">'+dur(ms.connected_secs)+'</span></div>'
          : '';
        h += '<tr>'
           + '<td class="mono">'+esc(mrid)+'</td>'
           + '<td class="mono">'+esc(ms.IP||'—')+':'+esc(ms.PORT||'—')+mUp+'</td>'
           + '<td><span class="dot '+(mok?'ok':'bad')+'"></span>'
           + '<span class="'+(mok?'status-ok':'status-bad')+'">'+(mok?'Connected':'Disconnected')+'</span>'
           + ' <span class="pill master">master</span></td>'
           + '</tr>';
      }

      const masterRid = ms ? ms.RADIO_ID : null;
      for(const pid of pids){
        const p        = peers[pid];
        const p2p      = p.CONNECTED;
        const rid      = p.RADIO_ID != null ? p.RADIO_ID : pid;
        // Self is shown in the system header; skip it from the peer membership table.
        if(String(rid) === String(s.RADIO_ID)) continue;
        // Skip if master happens to also appear in the peer list (avoid duplicate row).
        if(masterRid != null && String(rid) === String(masterRid)) continue;

        // Status: MASTER-mode CONNECTED is reliable (peer registered directly with us).
        // PEER-mode: presence in the peer list is the meaningful status; P2P keepalive
        //   may not be supported by all endpoints, shown only as a secondary badge.
        let statusHtml;
        if(mode === 'MASTER'){
          statusHtml = '<span class="dot '+(p2p?'ok':'bad')+'"></span>'
                     + '<span class="'+(p2p?'status-ok':'status-bad')+'">'+(p2p?'Connected':'Disconnected')+'</span>';
        } else {
          statusHtml = '<span class="dot ok"></span>'
                     + '<span class="status-ok">Connected</span>';
          if(p2p) statusHtml += ' <span class="sub">P2P ✓</span>';
        }

        const pUp = p.connected_secs != null
          ? '<div class="sub">up <span class="js-since" data-base="'+p.connected_secs+'" data-arr="'+Date.now()+'">'+dur(p.connected_secs)+'</span></div>'
          : '';
        h += '<tr>'
           + '<td class="mono">'+esc(rid)+'</td>'
           + '<td class="mono">'+esc(p.IP)+':'+esc(p.PORT)+pUp+'</td>'
           + '<td>'+statusHtml+'</td>'
           + '</tr>';
      }
      h += '</table>';
    }
  }
  el('systems').innerHTML = h;
}

function renderBridges(){
  const names = Object.keys(ST.bridges);
  if(!names.length){ el('bridges').innerHTML='<div class="empty">No bridge data (is bridge.py running?)</div>'; return; }
  let h='<table><tr><th>System</th><th>TS</th><th>TGID</th><th>Status</th><th>Timeout</th><th>Timer</th><th>Timeout Action</th><th>Activate TGIDs</th><th>Deactivate TGIDs</th></tr>';
  for(const b of names){
    h += '<tr class="bridge-head"><td colspan="9">'+esc(b)+'</td></tr>';
    for(const m of ST.bridges[b]){
      const on  = m.ACTIVE;
      const timerRunning = (m.TO_TYPE==='ON' && m.ACTIVE) || (m.TO_TYPE==='OFF' && !m.ACTIVE);
      const remS = timerRunning ? m.TIMER - Date.now()/1000 : null;
      const rem  = remS!=null ? '<span class="js-countdown mono" data-rem="'+remS.toFixed(1)+'" data-arr="'+Date.now()+'">'+(remS<=0?'expired':dur(remS))+'</span>'
                              : '<span class="sub">N/A</span>';
      const act = m.TO_TYPE==='ON'?'Disconnect after timer':m.TO_TYPE==='OFF'?'Reconnect after timer':'<span class="sub">None</span>';
      h += '<tr>'
         + '<td class="sysname">'+esc(m.SYSTEM)+'</td>'
         + '<td class="mono">'+esc(m.TS)+'</td>'
         + '<td class="mono">'+idName(m.TGID_NAME, m.TGID)+'</td>'
         + '<td><span class="'+(on?'status-ok':'status-bad')+'">'+(on?'Active':'Inactive')+'</span></td>'
         + '<td class="mono sub">'+(m.TO_TYPE!=='NONE'?Math.round(m.TIMEOUT/60)+'m':'<span class="sub">N/A</span>')+'</td>'
         + '<td>'+rem+'</td>'
         + '<td class="sub">'+act+'</td>'
         + '<td class="mono sub">'+(m.ON||[]).join(', ')+'</td>'
         + '<td class="mono sub">'+(m.OFF||[]).join(', ')+'</td>'
         + '</tr>';
    }
  }
  el('bridges').innerHTML = h+'</table>';
}

function logRow(e){
  const t   = new Date((e._arrived||0)*1000).toLocaleTimeString();
  const ev  = e.event||'';
  const isStart = ev.includes('START');
  const cls = isStart ? 'start' : 'end';
  const d   = e.duration != null ? ' · '+e.duration.toFixed(1)+'s' : '';
  const src = e.src_alias ? esc(e.src_alias)+' ('+e.src+')' : esc(String(e.src||''));
  const tg  = e.tgid_alias ? esc(e.tgid_alias)+' ('+e.tgid+')' : esc(String(e.tgid||''));
  return '<div><span class="ts">'+t+'</span> <span class="'+cls+'">'+esc(ev)+'</span>'
       + ' · '+esc(e.system||'')
       + ' TS'+esc(e.ts||'?')
       + ' · '+src+' → '+tg+d+'</div>';
}
function renderLog(){ el('log').innerHTML = ST.log.map(logRow).join(''); }

// ---- ticker: countdown timers + slot pill elapsed ----
setInterval(()=>{
  const now = Date.now();
  let reaped = false;
  for(const k in ST.active)   { if(now - (ST.active[k]._arrived||0)*1000    > STALE){ delete ST.active[k];    reaped=true; } }
  for(const k in ST.tx_active){ if(now - (ST.tx_active[k]._arrived||0)*1000 > STALE){ delete ST.tx_active[k]; reaped=true; } }
  for(const k in ST.hang)     { if(now/1000 > ST.hang[k]._expires)                  { delete ST.hang[k];      reaped=true; } }
  if(reaped){ renderSystems(); renderLog(); }
  document.querySelectorAll('.js-countdown').forEach(s=>{
    const r = (+s.dataset.rem) - (now - (+s.dataset.arr))/1000;
    s.textContent = r<=0?'expired':dur(r);
  });
  document.querySelectorAll('.js-dur').forEach(s=>{
    s.textContent = dur(now/1000 - (+s.dataset.start||0));
  });
  document.querySelectorAll('.js-since').forEach(s=>{
    s.textContent = dur((+s.dataset.base) + (now - (+s.dataset.arr))/1000);
  });
}, 1000);

// ---- websocket ----
function setConn(up){
  ST.dmrlink = up;
  const c = el('conn');
  c.className = 'badge '+(up?'up':'down');
  c.textContent = 'DMRlink3: '+(up?'connected':'disconnected');
}
function renderAll(){ renderSystems(); renderBridges(); renderLog(); }

function applyBridgeEvent(data){
  data._arrived = data._arrived || (Date.now()/1000);
  const ev  = data.event||'';
  const key = ckey(data);
  const ht  = (ST.systems[data.system]||{}).GROUP_HANGTIME||0;
  if(ev==='GROUP VOICE START'){
    delete ST.hang[key];
    ST.active[key] = data;
  } else if(ev==='GROUP VOICE END'){
    delete ST.active[key];
    if(ht>0) ST.hang[key] = Object.assign({}, data, {_ht:'rx', _expires: data._arrived+ht});
  } else if(ev==='GROUP VOICE TX START'){
    delete ST.hang[key];
    ST.tx_active[key] = data;
  } else if(ev==='GROUP VOICE TX END'){
    delete ST.tx_active[key];
    if(ht>0) ST.hang[key] = Object.assign({}, data, {_ht:'tx', _expires: data._arrived+ht});
  }
  ST.log.unshift(data);
  if(ST.log.length > 400) ST.log.pop();
  renderSystems();
  renderLog();
}

let sock = null;
function connect(){
  sock = new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws');
  sock.onmessage = ev => {
    const m = JSON.parse(ev.data);
    if(m.type==='initial'){
      setConn(m.dmrlink);
      ST.systems   = m.systems||{};
      ST.bridges   = m.bridges||{};
      ST.active    = {};
      ST.tx_active = {};
      ST.hang      = {};
      (m.active||[]).forEach(e => { e._arrived = e._arrived || (Date.now()/1000); ST.active[ckey(e)] = e; });
      ST.log = (m.log||[]);
      renderAll();
    }
    else if(m.type==='dmrlink'){
      setConn(m.connected);
      if(!m.connected){ ST.systems={}; ST.bridges={}; ST.active={}; ST.tx_active={}; ST.hang={}; renderAll(); }
    }
    else if(m.type==='config'){
      ST.systems = m.systems||{};
      renderSystems();
    }
    else if(m.type==='bridge'){
      ST.bridges = m.bridges||{};
      renderBridges();
    }
    else if(m.type==='bridge_event'){
      applyBridgeEvent(m.data||{});
    }
  };
  sock.onclose = () => {
    setConn(false);
    el('conn').textContent = 'DMRlink3: dashboard offline';
    setTimeout(connect, 2000);
  };
}
connect();
</script>
</body>
</html>
